name: Deploy to GitHub Pages

# Build the static export and publish it to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy step needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-progress deploy at a time; let a newer push cancel an older run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
